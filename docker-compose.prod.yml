version: '3.8'

services:
  # PostgreSQL Master Database
  postgres-master:
    image: postgres:15-alpine
    container_name: marketplace_postgres_master
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: auto_marketplace
      POSTGRES_REPLICATION_MODE: master
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: replicator123
    command: |
      postgres
      -c wal_level=replica
      -c hot_standby=on
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby_feedback=on
    ports:
      - "5432:5432"
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
      - ./docker/postgres/master.conf:/etc/postgresql/postgresql.conf
    networks:
      - marketplace_network

  # PostgreSQL Slave Database (Read Replica)
  postgres-slave:
    image: postgres:15-alpine
    container_name: marketplace_postgres_slave
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_MASTER_HOST: postgres-master
      POSTGRES_REPLICATION_MODE: slave
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: replicator123
    ports:
      - "5433:5432"
    volumes:
      - postgres_slave_data:/var/lib/postgresql/data
    depends_on:
      - postgres-master
    networks:
      - marketplace_network

  # MongoDB Database
  mongo:
    image: mongo:7.0
    container_name: marketplace_mongo
    environment:
      MONGO_INITDB_DATABASE: auto_marketplace
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - marketplace_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: marketplace_redis
    ports:
      - "6379:6379"
    networks:
      - marketplace_network

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: marketplace_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - marketplace_network

  # Kafka & Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: marketplace_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - marketplace_network

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: marketplace_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - marketplace_network

  # Main API Service
  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: marketplace_api
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: your-jwt-secret-key-change-this
      JWT_REFRESH_SECRET: your-refresh-secret-key-change-this
      # Master for writes
      POSTGRES_WRITE_HOST: postgres-master
      POSTGRES_WRITE_PORT: 5432
      # Slave for reads
      POSTGRES_READ_HOST: postgres-slave
      POSTGRES_READ_PORT: 5432
      POSTGRES_DB: auto_marketplace
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      MONGODB_URI: mongodb://mongo:27017/auto_marketplace
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password123@rabbitmq:5672
      KAFKA_BROKERS: kafka:9092
      ENCRYPTION_KEY: your-32-char-encryption-key-here
      GRPC_SERVER_HOST: grpc-service
      GRPC_SERVER_PORT: 50051
    ports:
      - "3001:3001"
    depends_on:
      - postgres-master
      - postgres-slave
      - mongo
      - redis
      - rabbitmq
      - kafka
      - grpc-service
    networks:
      - marketplace_network

  # gRPC Inventory Service
  grpc-service:
    build:
      context: ./backend/grpc-service
      dockerfile: Dockerfile
    container_name: marketplace_grpc
    environment:
      NODE_ENV: production
      GRPC_SERVER_PORT: 50051
      POSTGRES_HOST: postgres-master
      POSTGRES_PORT: 5432
      POSTGRES_DB: auto_marketplace
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://admin:password123@rabbitmq:5672
      KAFKA_BROKERS: kafka:9092
    ports:
      - "50051:50051"
    depends_on:
      - postgres-master
      - redis
      - rabbitmq
      - kafka
    networks:
      - marketplace_network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marketplace_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - marketplace_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: marketplace_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api
      - frontend
    networks:
      - marketplace_network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: marketplace_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - marketplace_network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: marketplace_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3030:3000"
    depends_on:
      - prometheus
    networks:
      - marketplace_network

networks:
  marketplace_network:
    driver: bridge

volumes:
  postgres_master_data:
  postgres_slave_data:
  mongo_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data: